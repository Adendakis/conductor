# Code Migration Demo Pipeline
# Demonstrates: progressive ticket creation, parallel WPs, HITL gates,
# reviewer pattern, rejection + rework, auto-approve, HITL editable fields
#
# Run: conductor init --reset && conductor serve --port 8080 && conductor watch-async

pipeline:
  name: "Code Migration Demo"
  phases:
    # Phase 0: Project Configuration (global — created at init, HITL fields)
    - id: "phase_0"
      name: "Project Configuration"
      scope: "global"
      steps:
        - id: "project_setup"
          name: "Project Configuration"
          agent: "__noop__"
          hitl_after: true
          description: "Review the migration settings below. Edit values as needed, then approve to begin analysis."
          hitl_fields:
            - name: "calibration_run"
              label: "Run calibration pass before full analysis"
              type: "boolean"
              default: false
            - name: "source_code_path"
              label: "Path to legacy source code"
              type: "text"
              default: "input/legacy/legacy_code"
            - name: "database_source_path"
              label: "Path to database source (leave empty to skip)"
              type: "text"
              default: ""
            - name: "target_language"
              label: "Target language for code generation"
              type: "select"
              options: ["Java", "C#", "Python"]
              default: "Java"
            - name: "target_framework"
              label: "Target framework"
              type: "select"
              options: ["Spring Boot", "Quarkus", "Micronaut"]
              default: "Spring Boot"
            - name: "max_pod_concurrency"
              label: "Max parallel pods"
              type: "number"
              default: 3
          deliverables: []

    # Phase 1: Analysis (global — created at init)
    - id: "phase_1"
      name: "Legacy Analysis"
      scope: "global"
      depends_on: ["phase_0"]
      creates_next_phases: ["phase_2"]
      steps:
        - id: "analyze_db"
          name: "Analyze Database Schema"
          agent: "demo_analyzer"
          prompt: "agents/analyzer/prompts/analyze.md"
          hitl_after: false
          deliverables:
            - path: "output/analysis/db_report.md"
              type: "markdown"

        - id: "analyze_code"
          name: "Analyze Source Code"
          agent: "demo_analyzer"
          prompt: "agents/analyzer/prompts/analyze.md"
          hitl_after: true
          deliverables:
            - path: "output/analysis/code_report.md"
              type: "markdown"

    # Phase 2: Planning (global — created when Phase 1 completes)
    - id: "phase_2"
      name: "Migration Planning"
      scope: "global"
      creates_next_phases: ["phase_3"]
      steps:
        - id: "define_workpackages"
          name: "Define Workpackages"
          agent: "demo_planner"
          prompt: "agents/planner/prompts/plan.md"
          hitl_after: true
          deliverables:
            - path: "output/analysis/workpackages/Workpackage_Planning.json"
              type: "json"

    # Phase 3: Specification (per-workpackage — created when Phase 2 completes)
    - id: "phase_3"
      name: "Business Specification"
      scope: "per_workpackage"
      creates_next_phases: ["phase_4"]
      steps:
        - id: "extract_logic"
          name: "Business Logic Extraction"
          agent: "demo_specialist"
          prompt: "agents/specialist/prompts/extract.md"
          hitl_after: false
          deliverables:
            - path: "output/specs/{wp_id}/logic.md"
              type: "markdown"

        - id: "review_logic"
          name: "Logic Review"
          type: "reviewer_step"
          agent: "demo_reviewer"
          prompt: "agents/reviewer/prompts/review.md"
          depends_on: ["extract_logic"]
          hitl_after: true
          deliverables:
            - path: "output/specs/{wp_id}/review.md"
              type: "markdown"

    # Phase 4: Final (global — created when all Phase 3 WPs complete)
    - id: "phase_4"
      name: "Final Report"
      scope: "global"
      steps:
        - id: "final_report"
          name: "Generate Final Report"
          agent: "demo_reporter"
          prompt: "agents/reporter/prompts/report.md"
          hitl_after: true
          deliverables:
            - path: "output/final_report.md"
              type: "markdown"
