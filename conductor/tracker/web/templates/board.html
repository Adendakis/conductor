<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conductor — Board</title>
  <link rel="stylesheet" href="/static/style.css?v=3">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <div class="header">
    <div style="display:flex; align-items:center; gap:10px;">
      <img src="/logo" alt="Logo" style="height:64px;" onerror="this.style.display='none'">
      <h1>Conductor</h1>
    </div>
    <div class="stats" hx-get="/api/stats" hx-trigger="load, every 10s" hx-swap="innerHTML">
      Loading...
    </div>
  </div>

  <div class="filters">
    <span>Filter:</span>
    <select id="filter-phase" onchange="refreshBoard()">
      <option value="">All Phases</option>
    </select>
    <select id="filter-workpackage" onchange="refreshBoard()">
      <option value="">All Workpackages</option>
    </select>
    <select id="filter-status" onchange="refreshBoard()">
      <option value="">All Statuses</option>
      <option value="backlog">Backlog</option>
      <option value="ready">Ready</option>
      <option value="in_progress">In Progress</option>
      <option value="awaiting_review">Awaiting Review</option>
      <option value="done">Done</option>
      <option value="failed">Failed</option>
      <option value="paused">Paused</option>
    </select>
    <button class="btn" onclick="clearFilters()">✕ Clear</button>
    <button class="btn" onclick="refreshBoard()">↻ Refresh</button>
    <span style="margin-left:auto;"></span>
    <button id="compact-toggle" class="btn" onclick="toggleCompact()">▣ Compact</button>
  </div>

  <div id="board-container" class="board"
       hx-get="/partials/board" hx-trigger="load" hx-swap="innerHTML">
    <div class="empty">Loading board...</div>
  </div>

  <!-- Ticket detail modal -->
  <div id="ticket-modal"></div>

  <script>
    // --- UTC → local time conversion ---
    function convertUtcTimestamps(root) {
      (root || document).querySelectorAll('.utc-time').forEach(function(el) {
        var utc = el.getAttribute('data-utc');
        if (!utc) { el.textContent = '—'; return; }
        try {
          // Ensure the string is parsed as UTC
          if (!utc.endsWith('Z') && !utc.includes('+')) utc += 'Z';
          var d = new Date(utc);
          if (isNaN(d.getTime())) { el.textContent = utc.slice(0, 16); return; }
          var pad = function(n) { return n < 10 ? '0' + n : n; };
          el.textContent = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate())
            + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
        } catch(e) {
          el.textContent = utc.slice(0, 16);
        }
      });
    }

    // Convert on initial page load
    document.addEventListener('DOMContentLoaded', function() {
      convertUtcTimestamps(document);
    });

    // Populate filter dropdowns on load
    async function loadFilters() {
      const resp = await fetch('/api/tickets');
      const tickets = await resp.json();

      const phases = [...new Set(tickets.map(t => t.metadata.phase).filter(Boolean))].sort();
      const wps = [...new Set(tickets.map(t => t.metadata.workpackage).filter(Boolean))].sort();

      const phaseSelect = document.getElementById('filter-phase');
      phases.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        phaseSelect.appendChild(opt);
      });

      const wpSelect = document.getElementById('filter-workpackage');
      wps.forEach(w => {
        const opt = document.createElement('option');
        opt.value = w;
        opt.textContent = w;
        wpSelect.appendChild(opt);
      });
    }
    loadFilters();

    function getFilterParams() {
      const phase = document.getElementById('filter-phase').value;
      const wp = document.getElementById('filter-workpackage').value;
      const status = document.getElementById('filter-status').value;
      const params = new URLSearchParams();
      if (phase) params.set('phase', phase);
      if (wp) params.set('workpackage', wp);
      if (status) params.set('status', status);
      return params.toString();
    }

    function refreshBoard() {
      const params = getFilterParams();
      const url = '/partials/board' + (params ? '?' + params : '');
      htmx.ajax('GET', url, {target: '#board-container', swap: 'innerHTML'});
    }

    function clearFilters() {
      document.getElementById('filter-phase').value = '';
      document.getElementById('filter-workpackage').value = '';
      document.getElementById('filter-status').value = '';
      refreshBoard();
    }

    // Auto-reload board every 5 seconds (preserves filters)
    let autoReloadInterval = setInterval(refreshBoard, 5000);

    // --- Compact mode ---
    function isCompact() {
      return localStorage.getItem('conductor-compact') === '1';
    }

    function applyCompact() {
      var board = document.getElementById('board-container');
      var btn = document.getElementById('compact-toggle');
      if (!board || !btn) return;
      if (isCompact()) {
        board.classList.add('compact');
        btn.classList.add('compact-active');
        btn.textContent = '▣ Compact ✓';
      } else {
        board.classList.remove('compact');
        btn.classList.remove('compact-active');
        btn.textContent = '▣ Compact';
      }
    }

    function toggleCompact() {
      var newVal = isCompact() ? '0' : '1';
      localStorage.setItem('conductor-compact', newVal);
      applyCompact();
    }

    // Apply compact on initial load
    applyCompact();

    // Pause auto-reload when modal is open
    function showTicket(ticketId) {
      clearInterval(autoReloadInterval);
      htmx.ajax('GET', '/partials/ticket/' + ticketId, {target: '#ticket-modal', swap: 'innerHTML'});
    }

    function closeModal() {
      document.getElementById('ticket-modal').innerHTML = '';
      refreshBoard();
      autoReloadInterval = setInterval(refreshBoard, 5000);  // ← restarts it
    }

    // Close modal on escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // Unified htmx:afterSwap handler
    document.body.addEventListener('htmx:afterSwap', function(e) {
      // Convert UTC timestamps on any swap
      convertUtcTimestamps(e.target);

      // Re-apply compact mode after board refresh
      if (e.target.id === 'board-container') {
        applyCompact();
      }

      // Format stats
      if (e.target.classList.contains('stats')) {
        try {
          const data = JSON.parse(e.target.innerText);
          e.target.innerHTML = `${data.total} tickets | ` +
            Object.entries(data.by_status)
              .filter(([k,v]) => v > 0)
              .map(([k,v]) => `${k}: ${v}`)
              .join(' · ');
        } catch(err) {}
      }
    });
  </script>
</body>
</html>
